<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale 聊天数据迁移助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex flex-col items-center justify-center p-4 text-slate-700">

    <!-- 顶部安全徽章 -->
    <div class="mb-6 flex items-center space-x-2 text-indigo-600 bg-white/80 backdrop-blur px-4 py-1.5 rounded-full shadow-sm text-sm font-medium border border-indigo-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
        <span>本地离线处理 · 不上传服务器</span>
    </div>

    <div class="glass-effect rounded-3xl shadow-2xl w-full max-w-2xl p-8 md:p-10 space-y-8 border border-white/50 relative overflow-hidden">
        
        <!-- 装饰背景 -->
        <div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 bg-blue-100 rounded-full blur-3xl opacity-30 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-64 h-64 bg-indigo-100 rounded-full blur-3xl opacity-30 pointer-events-none"></div>

        <!-- 标题区 -->
        <div class="text-center space-y-3 relative z-10">
            <div class="inline-block bg-gradient-to-tr from-blue-100 to-indigo-50 text-blue-600 p-4 rounded-2xl mb-2 shadow-sm">
                <span class="text-4xl">🐳</span>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Whale 数据迁移助手</h1>
            <p class="text-slate-500 text-lg">保留每一份珍贵回忆</p>
        </div>

        <!-- 上传区 -->
        <div class="group relative border-3 border-dashed border-slate-300 rounded-2xl p-10 text-center hover:border-blue-500 hover:bg-blue-50/50 transition-all duration-300 cursor-pointer bg-white/50" id="dropZone">
            <input type="file" id="fileInput" accept=".json" class="hidden">
            
            <div class="space-y-4 pointer-events-none">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform duration-300 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                </div>
                <div>
                    <p class="text-lg font-bold text-slate-700">点击上传备份文件</p>
                    <p class="text-sm text-slate-400 mt-2">支持 Lovemo 等应用的导出格式 (.json)</p>
                </div>
            </div>
            
            <!-- 文件信息浮层 -->
            <div id="fileInfo" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center rounded-2xl z-20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-green-500 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="font-bold text-slate-800 text-lg mb-1" id="fileNameDisplay">filename.json</p>
                <p class="text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-full" id="fileSizeDisplay">0 KB</p>
                <button onclick="resetFile(event)" class="mt-6 text-sm text-slate-400 hover:text-red-500 transition-colors flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    重新选择
                </button>
            </div>
        </div>

        <!-- 转换按钮 -->
        <button id="convertBtn" disabled class="group w-full bg-slate-200 text-slate-400 font-bold py-4 px-6 rounded-xl transition-all duration-300 flex items-center justify-center space-x-2 shadow-none cursor-not-allowed relative overflow-hidden">
            <span class="relative z-10 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" />
                </svg>
                等待文件上传
            </span>
        </button>

        <!-- 说明区 -->
        <div class="bg-slate-50 rounded-xl p-5 border border-slate-200/60">
            <h3 class="font-bold text-slate-700 mb-3 flex items-center text-sm uppercase tracking-wide">
                迁移内容详情
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm text-slate-600">
                <div class="flex items-center space-x-2 bg-white p-2 rounded border border-slate-100">
                    <span class="text-green-500">✓</span> <span>人设 & 记忆</span>
                </div>
                <div class="flex items-center space-x-2 bg-white p-2 rounded border border-slate-100">
                    <span class="text-green-500">✓</span> <span>完整聊天记录</span>
                </div>
                <div class="flex items-center space-x-2 bg-white p-2 rounded border border-slate-100">
                    <span class="text-green-500">✓</span> <span>角色头像</span>
                </div>
                <div class="flex items-center space-x-2 bg-white p-2 rounded border border-slate-100">
                    <span class="text-yellow-500">!</span> <span>表情包 (转为文字)</span>
                </div>
            </div>
        </div>

        <!-- 只有出错时才显示的日志区 -->
        <div id="statusLog" class="hidden bg-slate-800 text-red-300 p-4 rounded-xl text-xs font-mono h-32 overflow-y-auto whitespace-pre-wrap border border-slate-700"></div>

        <!-- 底部技术免责声明 -->
        <div class="border-t border-slate-200 pt-4 mt-2">
            <p class="text-xs text-slate-400 text-center leading-relaxed">
                <span class="font-semibold text-slate-500">技术说明：</span>
                本工具仅对用户<span class="text-slate-600 font-medium">自行导出的标准 JSON 数据格式</span>进行结构解析与清洗，以实现数据跨平台兼容。<br>
                工具不包含任何针对第三方软件的解密、逆向工程或非公开 API 调用逻辑。
            </p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const convertBtn = document.getElementById('convertBtn');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const fileSizeDisplay = document.getElementById('fileSizeDisplay');
        const statusLog = document.getElementById('statusLog');

        let sourceFile = null;

        // 默认记忆表格模板
        const DEFAULT_MEMORY_TABLE = `## 📋 记忆表格

### 【现在】
| 项目 | 内容 |
|------|------|
| 地点 | 未知 |
| 人物 | {{char}}, {{user}} |
| 时间 | {{time}} |

### 【未来】
| 约定事项 | 详细内容 |
|----------|----------|
| [事项1]   | [具体的约定内容、时间、地点] |

### 【过去】
| 人物 | 事件 | 地点 | 时间 |
|------|------|------|------|
| [相关人物] | [发生的重要事件] | [事件发生地点] | [具体年月日] |`;

        // UI 交互逻辑
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            dropZone.classList.add('border-blue-500', 'bg-blue-50/80'); 
        });
        
        dropZone.addEventListener('dragleave', (e) => { 
            e.preventDefault(); 
            dropZone.classList.remove('border-blue-500', 'bg-blue-50/80'); 
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50/80');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => { 
            if (e.target.files.length) handleFile(e.target.files[0]); 
        });

        function handleFile(file) {
            if (file.type !== "application/json" && !file.name.endsWith('.json')) {
                alert("请上传 .json 格式的备份文件");
                return;
            }
            sourceFile = file;
            
            // 更新 UI
            fileNameDisplay.textContent = file.name;
            fileSizeDisplay.textContent = (file.size / 1024).toFixed(2) + " KB";
            fileInfo.classList.remove('hidden');
            statusLog.classList.add('hidden');
            
            // 激活按钮
            convertBtn.disabled = false;
            convertBtn.innerHTML = `
                <span class="relative z-10 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-pulse-soft" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    开始转换并下载
                </span>
            `;
            convertBtn.className = "group w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 flex items-center justify-center space-x-2 shadow-lg shadow-blue-200 transform hover:-translate-y-0.5 relative overflow-hidden";
        }

        function resetFile(e) {
            e.stopPropagation();
            sourceFile = null;
            fileInput.value = '';
            fileInfo.classList.add('hidden');
            convertBtn.disabled = true;
            convertBtn.innerHTML = `<span class="relative z-10 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" /></svg>等待文件上传</span>`;
            convertBtn.className = "group w-full bg-slate-200 text-slate-400 font-bold py-4 px-6 rounded-xl transition-all duration-300 flex items-center justify-center space-x-2 shadow-none cursor-not-allowed relative overflow-hidden";
        }

        function logError(msg) {
            statusLog.classList.remove('hidden');
            statusLog.textContent = `❌ 错误: ${msg}`;
        }

        convertBtn.addEventListener('click', async () => {
            if (!sourceFile) return;
            
            convertBtn.disabled = true;
            convertBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>正在处理数据...</span>
            `;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const sourceData = JSON.parse(e.target.result);
                    // 模拟一点延迟，让用户感觉到“正在工作”
                    setTimeout(() => processData(sourceData), 600);
                } catch (err) {
                    logError(`文件解析失败: ${err.message}`);
                    convertBtn.disabled = false;
                    convertBtn.textContent = "重试";
                }
            };
            reader.readAsText(sourceFile);
        });

        // --- 新增辅助函数：解析记忆内容并生成表格行 ---
        function parseMemoryContentToRow(content) {
            // 尝试匹配开头的时间格式，例如 "2026.01.11 23:14。" 或 "2026-01-20"
            const regex = /^(\d{4}[./-]\d{1,2}[./-]\d{1,2}(?:\s+\d{1,2}:\d{1,2})?)[.。,\s]+([\s\S]*)/;
            const match = String(content || '').match(regex);

            let time = "未知时间";
            let event = String(content || '');

            if (match) {
                time = match[1];
                event = match[2];
            }

            // 清理换行，避免破坏表格格式
            event = event.replace(/[\r\n]+/g, ' ').trim();

            // 返回 Markdown 表格行： | 人物 | 事件 | 地点 | 时间 |
            return `| 双方 | ${event} | - | ${time} |`;
        }

        // --- 新增辅助函数：将新记忆插入到记忆表中 ---
        function appendMemoriesToTable(originalTable, newMemories) {
            if (!newMemories || newMemories.length === 0) return originalTable;

            const base = String(originalTable || '');
            const sectionHeader = "### 【过去】";
            const sectionIndex = base.indexOf(sectionHeader);

            // 如果没找到板块，直接追加在最后
            if (sectionIndex === -1) {
                let newSection = `\n\n${sectionHeader}\n| 人物 | 事件 | 地点 | 时间 |\n|------|------|------|------|\n`;
                newSection += newMemories.map(m => parseMemoryContentToRow(m)).join('\n');
                return base + newSection;
            }

            // 找到板块后，寻找表格头分隔线，然后在其后插入行
            const tableHeaderEnd = "|------|------|------|------|";
            const insertPoint = base.indexOf(tableHeaderEnd, sectionIndex);
            if (insertPoint === -1) return base;

            const splitPoint = insertPoint + tableHeaderEnd.length;
            const before = base.substring(0, splitPoint);
            const after = base.substring(splitPoint);
            const newRows = "\n" + newMemories.map(m => parseMemoryContentToRow(m)).join('\n');
            return before + newRows + after;
        }

        // --- 主处理函数 ---
        function processData(source) {
            try {
                // 1. 初始化目标结构
                const target = {
                    "_metadata": {
                        "name": "WhaleLLTDB",
                        "version": 13,
                        "stores": ["apiSettings", "contacts", "userProfile", "emojis", "backgrounds", "customModels", "customStyles", "emojiBlobs", "hashtagCache", "moments", "songs", "todoItems", "weiboPosts"],
                        "exportTime": new Date().toISOString()
                    },
                    "apiSettings": [{
                        "id": "settings",
                        "model": "gemini-2.5-pro",
                        "secondaryModel": "sync_with_primary",
                        "contextMessageCount": 10,
                        "url": "",
                        "key": ""
                    }],
                    "contacts": [],
                    "userProfile": [],
                    "emojis": [],
                    "backgrounds": [{"id": "backgroundsMap"}],
                    "bubbleStickers": [],
                    "bubbleStyles": [],
                    "customModels": [{"id": "models", "data": {}}],
                    "customStyles": [],
                    "emojiBlobs": [],
                    "hashtagCache": [{"id": "cache"}],
                    "moments": [],
                    "songs": [],
                    "todoItems": [],
                    "weiboPosts": []
                };

                // 2. 解析联系人列表
                let sourceContacts = [];
                if (source.contacts) {
                    if (typeof source.contacts === 'string') {
                        try {
                            sourceContacts = JSON.parse(source.contacts);
                        } catch (e) {
                            throw new Error("contacts 字段 JSON 格式错误");
                        }
                    } else if (Array.isArray(source.contacts)) {
                        sourceContacts = source.contacts;
                    }
                }

                if (sourceContacts.length === 0) {
                    throw new Error("未在文件中找到有效的联系人数据 (contacts)");
                }

                let myPersonaFromContact = "";

                // 3. 遍历并转换每个角色
                sourceContacts.forEach(contact => {
                    if (!myPersonaFromContact && contact.myPersona) {
                        myPersonaFromContact = contact.myPersona;
                    }

                    // 构建人设 Prompt
                    let fullPersonality = "";
                    if (contact.aiPersona) fullPersonality += `[基本设定]\n${contact.aiPersona}\n\n`;
                    if (contact.speakingStyle) fullPersonality += `[说话风格]\n${contact.speakingStyle}\n\n`;
                    if (contact.commonExpressions) fullPersonality += `[常用语录]\n${contact.commonExpressions}\n\n`;
                    if (contact.background) fullPersonality += `[背景故事]\n${contact.background}\n\n`;
                    if (contact.myPersona) fullPersonality += `[用户设定]\n${contact.myPersona}`;

                    // 头像处理
                    let avatarUrl = "";
                    if (contact.avatar && typeof contact.avatar === 'string' && contact.avatar.startsWith('http')) {
                        avatarUrl = contact.avatar;
                    }

                    // 预设记忆表内容
                    let initialMemoryTable = DEFAULT_MEMORY_TABLE
                        .replace('{{char}}', contact.name)
                        .replace('{{user}}', '我')
                        .replace('{{time}}', new Date().toLocaleString());

                    const targetContact = {
                        "id": contact.id,
                        "name": contact.name,
                        "avatar": avatarUrl,
                        "personality": fullPersonality.trim(),
                        "customPrompts": "",
                        "voiceId": "",
                        "bubbleStyleId": "",
                        "isPinned": false,
                        "type": "private",
                        "lastMessage": contact.lastMessage || "",
                        "lastTime": new Date(contact.lastMessageTime || Date.now()).toISOString(),
                        "memoryTableContent": initialMemoryTable,
                        "worldBook": [],
                        "messages": []
                    };

                    // 4. 处理聊天记录
                    const chatKey = `chat:${contact.id}`;

                    // 用来收集 create_memory 的内容
                    let extractedMemories = [];

                    if (source[chatKey]) {
                        let sourceMessages = [];
                        try {
                            if (typeof source[chatKey] === 'string') {
                                sourceMessages = JSON.parse(source[chatKey]);
                            } else {
                                sourceMessages = source[chatKey];
                            }
                        } catch (e) {
                            console.warn(`无法解析 ${contact.name} 的消息记录`);
                        }

                        const validMessages = [];
                        sourceMessages.forEach(msg => {
                            const createdAt = msg && msg.createdAt ? msg.createdAt : Date.now();
                            const time = new Date(createdAt).toISOString();

                            let content = msg ? msg.content : '';
                            let type = "text";
                            let role = msg ? msg.role : 'user';
                            const senderId = role === 'user' ? 'user' : contact.id;

                            // --- JSON 消息解析逻辑（同时处理 user 和 assistant）---
                            if (typeof content === 'string' && content.trim().startsWith('{')) {
                                try {
                                    const innerContent = JSON.parse(content);

                                    // 1) 过滤废弃状态：直接丢弃 change_status
                                    if (innerContent && innerContent.type === 'change_status') {
                                        return;
                                    }

                                    // 2) 提取记忆：捕获 create_memory 的内容，将其暂存，不放入聊天记录
                                    if (innerContent && innerContent.type === 'create_memory') {
                                        if (innerContent.memory_content) {
                                            extractedMemories.push(innerContent.memory_content);
                                        }
                                        return;
                                    }

                                    // 3) sticker：如果带 image URL，转为 HTML 图片
                                    if (innerContent && innerContent.type === 'sticker') {
                                        if (innerContent.image) {
                                            const alt = innerContent.name || '表情';
                                            content = `<img src="${innerContent.image}" alt="${alt}" style="max-width: 150px; border-radius: 8px;">`;
                                        } else if (innerContent.name) {
                                            // 旧格式：只有名字
                                            content = `<emoji>${innerContent.name}</emoji>`;
                                        }
                                    }

                                    // 4) text：兼容 Assistant 的 text JSON
                                    if (innerContent && innerContent.type === 'text' && innerContent.content) {
                                        content = innerContent.content;
                                    }

                                } catch (e) {
                                    // JSON 解析失败，按普通文本处理
                                }
                            }
                            // ------------------------------------------------

                            validMessages.push({
                                "role": role,
                                "content": content,
                                "type": type,
                                "time": time,
                                "senderId": senderId
                            });
                        });

                        targetContact.messages = validMessages;
                    }

                    // 5. 记忆表自动填充：将提取出的记忆注入到记忆表中
                    if (extractedMemories.length > 0) {
                        targetContact.memoryTableContent = appendMemoriesToTable(
                            targetContact.memoryTableContent,
                            extractedMemories
                        );
                    }

                    target.contacts.push(targetContact);
                });

                // 6. 生成用户资料
                const userProfile = {
                    "id": "profile",
                    "name": "我",
                    "avatar": "",
                    "personality": myPersonaFromContact || "默认用户设定",
                    "bubbleStyleId": "",
                    "wallet": { "balance": 0, "transactions": [] }
                };
                target.userProfile.push(userProfile);

                // 完成
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                downloadJSON(target, `whale-backup-migrated-${timestamp}.json`);

                convertBtn.className = "group w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 flex items-center justify-center space-x-2 shadow-lg shadow-green-200 transform scale-100";
                convertBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span>转换成功！已自动下载</span>
                `;
                convertBtn.disabled = false;
            } catch (err) {
                console.error(err);
                logError(err.message);
                convertBtn.disabled = false;
                convertBtn.className = "w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 flex items-center justify-center space-x-2 shadow-lg";
                convertBtn.textContent = "转换失败 (点击重试)";
            }
        }

        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
